seed: 42
reproducibility:
  deterministic_mode: true
training:
  total_timesteps: 100000
  fee_rate: 0.0
  max_iterations: 20
  improvement_threshold: 0.01
  additional_timesteps: 10000
  n_stagnant_loops: 4
  n_envs: 4  # Parallel envs for faster rollouts (safe with sequential windows)
  random_start_pct: 1.0
  eval_frequency: 1
  verbose: 0
  evaluation:
    metric: sortino
  early_stopping:
    enabled: true
    patience: 7
