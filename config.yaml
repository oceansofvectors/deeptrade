  williams_r:
    enabled: false
    length: 14
  sma:
    enabled: false
    length: 20
  ema:
    enabled: false
    length: 20
  disparity:
    enabled: false
  atr:
    enabled: true
    length: 14
  obv:
    enabled: false
  cmf:
