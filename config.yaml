seed: 42
training:
  total_timesteps: 100000
  fee_rate: 0.0
  max_iterations: 20
  improvement_threshold: 0.01
  additional_timesteps: 20000
  n_stagnant_loops: 10
  n_envs: 4
  eval_frequency: 2
  verbose: 0
  evaluation:
    metric: sortino
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
data:
  train_ratio: 0.6
  validation_ratio: 0.2
  test_ratio: 0.2
  embargo_days: 1
  market_hours_only: true
normalization:
  scaler_type: robust
indicators:
  supertrend:
    enabled: false
    length: 20
    multiplier: 3
    smooth_periods: 3
    lookback_periods: 2
  rsi:
    enabled: true
    length: 14
  cci:
    enabled: false
    length: 20
  adx:
    enabled: true
    length: 14
  adx_pos:
    enabled: false
  adx_neg:
    enabled: false
  stoch_k:
    enabled: false
    length: 14
  stoch_d:
    enabled: false
    length: 3
  macd:
    enabled: true
    fast: 12
    slow: 26
    signal: 9
  roc:
    enabled: false
    length: 10
  williams_r:
    enabled: false
    length: 14
  sma:
    enabled: false
    length: 20
  ema:
    enabled: false
    length: 20
  disparity:
    enabled: false
  atr:
    enabled: true
    length: 14
  obv:
    enabled: false
  cmf:
    enabled: false
    length: 20
  psar:
    enabled: false
    af: 0.02
    max_af: 0.2
    include_norm: false
  volume:
    enabled: true
    ma_length: 20
  vwap:
    enabled: false
  day_of_week:
    enabled: true
  minutes_since_open:
    enabled: true
  z_score:
    enabled: false
    length: 50
  rrcf_anomaly:
    enabled: false
    window_size: 100
    num_trees: 64
    tree_size: 256
    feature_cols:
    - close
    random_seed: 42
  lstm_features:
    enabled: true
    lookback: 20
    hidden_size: 32
    num_layers: 1
    output_size: 8
    pretrain_epochs: 50
    pretrain_lr: 0.001
    pretrain_batch_size: 64
    pretrain_patience: 10
    tuning:
      enabled: false
      n_trials: 20
      parameters:
        hidden_size:
          choices: [16, 32, 64, 128]
        num_layers:
          min: 1
          max: 2
        output_size:
          choices: [4, 8, 16]
        lookback:
          choices: [10, 20, 30, 50]
        pretrain_lr:
          min: 0.0001
          max: 0.01
          log: true
environment:
  initial_balance: 100000.0
  position_size: 1
  transaction_cost: 2.5  # Commission per contract per fill
execution_costs:
  half_spread_points: 0.25  # NQ half-spread: 0.25 pts = $5 per fill
  base_slippage_points: 0.10  # Base slippage: 0.10 pts = $2 per fill (3x at open/close)
model:
  ent_coef: 0.1  # Higher entropy to prevent directional collapse with 2-action space
  ent_coef_decay: true  # Decay to exploit learned policy
  final_ent_coef: 0.02  # Keep meaningful entropy floor
  learning_rate: 0.0003  # SB3 default, decays via use_lr_decay
  n_steps: 384  # Shorter rollouts for LSTM to maintain temporal coherence
  batch_size: 48  # n_steps / 8 for stable mini-batch training
  gamma: 0.9945  # Reduced: 0.9878^384=0.009 (too myopic); 0.9945^384=0.12 (better)
  gae_lambda: 0.85  # Reduced for more aggressive bootstrapping, less reliance on uncertain future
  use_lr_decay: true
sequence_model:
  enabled: true
  lstm_hidden_size: 64  # Reduced to prevent overfitting with 2-action space
  n_lstm_layers: 1  # Tuned (trial 6)
  shared_lstm: false
  reset_on_new_day: false
  device: auto
risk_management:
  enabled: false
  dynamic_sl_tp:
    enabled: false
    sl_multiplier_range: [1.5, 5.0]
    tp_multiplier_range: [1.5, 5.0]
    num_choices: 8
    default_sl_multiplier: 2.0
    default_tp_multiplier: 3.0
  daily_risk_limit:
    enabled: false
    max_daily_loss: 3000.0
    daily_take_profit: 2000.0
  stop_loss:
    enabled: false
    mode: atr
    percentage: 17
    atr_multiplier: 4.0  # Wide stop to avoid noise - only catches catastrophic moves
  take_profit:
    enabled: false
    mode: atr
    percentage: 20
    atr_multiplier: 6.0  # Wide TP at 6x ATR (1.5:1 reward/risk ratio)
  trailing_stop:
    enabled: false
    percentage: 1.0
  position_sizing:
    enabled: false
    size_multiplier: 1.0
    max_risk_per_trade_percentage: 1.0
walk_forward:
  enabled: true
  window_size: 120
  step_size: 24
  max_windows: 2
  parallel_processing:
    enabled: true
    n_processes: 0
    max_workers: 0
hyperparameter_tuning:
  enabled: false
  n_trials: 10
  tuning_timesteps: 10000
  parallel_processing:
    enabled: false
    n_jobs: 5
  parameters:
    learning_rate:
      min: 1.0e-05
      max: 0.001
      log: true
    n_steps:
      min: 500
      max: 2000
      log: true
    ent_coef:
      min: 1.0e-05
      max: 0.5
      log: true
    batch_size:
      min: 8
      max: 128
      log: true
    gamma:
      min: 0.95
      max: 0.999
      log: false
    gae_lambda:
      min: 0.9
      max: 0.99
      log: false
    lstm_hidden_size:
      choices:
      - 64
      - 128
      - 256
      - 512
    n_lstm_layers:
      min: 1
      max: 2
