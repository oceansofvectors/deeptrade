  volume:
    enabled: true
    ma_length: 20
  vwap:
    enabled: true
  opening_range:
    enabled: true
    minutes: 30
  day_of_week:
    enabled: true
  minutes_since_open:
    enabled: true
  z_score:
    enabled: false
    length: 50
  rrcf_anomaly:
    enabled: false
    window_size: 100
    num_trees: 64
    tree_size: 256
    feature_cols:
    - close
    random_seed: 42
  rolling_drawdown:
    enabled: true
    window: 50
  vol_percentile:
    enabled: true
    window: 60
  lstm_features:
    enabled: true
    lookback: 10
    hidden_size: 32
    num_layers: 2
    output_size: 4
    beta: 0.0008266502663726915
    kl_warmup_epochs: 10
    pretrain_epochs: 100
    pretrain_lr: 0.0075741650324583016
    pretrain_batch_size: 64
    pretrain_patience: 10
    pretrain_min_delta: 0.001
    tuning:
      enabled: false
      n_trials: 20
      parameters:
        hidden_size:
          choices:
          - 16
          - 32
          - 64
          - 128
        num_layers:
          min: 1
          max: 2
        output_size:
          choices:
          - 4
          - 8
          - 16
        lookback:
          choices:
          - 10
          - 20
          - 30
          - 50
        pretrain_lr:
          min: 0.0001
          max: 0.01
          log: true
        beta:
          min: 1.0e-05
          max: 0.01
          log: true
