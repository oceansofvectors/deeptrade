  base_slippage_points: 0.0
reward:
  base_scale: 500.0
  loss_multiplier: 0.7494921246671704  # Latest walk-forward tuning
  drawdown_penalty_threshold: 0.025
  drawdown_penalty: 2.2
  turnover_penalty: 0.0100
  calm_holding_bonus: 0.001380767344043113  # Latest walk-forward tuning
  flat_time_penalty: 0.0040
  flat_time_grace_steps: 3
model:
  ent_coef: 0.16239021973061413  # Latest walk-forward tuning
  ent_coef_decay: true
  final_ent_coef: 0.045
  learning_rate: 0.00029570465033637995  # Latest walk-forward tuning
  n_steps: 753  # Latest walk-forward tuning
  batch_size: 83  # Tuned
  gamma: 0.9949826964778363  # Latest walk-forward tuning
  gae_lambda: 0.85
  use_lr_decay: true
sequence_model:
  enabled: true
  lstm_hidden_size: 256  # Latest walk-forward tuning
  n_lstm_layers: 1  # Latest walk-forward tuning
  shared_lstm: false
  reset_on_new_day: false
  device: auto
risk_management:
  enabled: false
  dynamic_sl_tp:
    enabled: false
    sl_multiplier_range:
    - 1.5
    - 5.0
    tp_multiplier_range:
    - 1.5
    - 5.0
    num_choices: 8
    default_sl_multiplier: 2.0
    default_tp_multiplier: 3.0
  daily_risk_limit:
    enabled: false
    max_daily_loss: 3000.0
    daily_take_profit: 2000.0
  stop_loss:
    enabled: false
    mode: atr
    percentage: 17
    atr_multiplier: 4.0
  take_profit:
    enabled: false
    mode: atr
    percentage: 20
    atr_multiplier: 6.0
  trailing_stop:
    enabled: false
    percentage: 1.0
  position_sizing:
    enabled: false
    size_multiplier: 1.0
    max_risk_per_trade_percentage: 1.0
walk_forward:
  enabled: true
  window_size: 120
  step_size: 24
  max_windows: 4
  parallel_processing:
    enabled: false
    n_processes: 0
    max_workers: 0
hyperparameter_tuning:
  enabled: true
  n_trials: 40
  stage1_trials: 24
  stage2_trials: 16
  stage1_timesteps: 10000
  stage2_timesteps: 20000
  stage2_window_shrink: 0.35
  tuning_timesteps: 20000
  pruning_eval_steps: 5000
  holdout_windows: 2  # Additional validation windows scored after the primary tuning window
  baseline_margin: 0.25
  early_prune_zero_trade: true
  early_prune_flat_action_pct: 99.0
  early_prune_single_action: true
  n_envs: 1  # Keep each Optuna trial single-process to avoid n_jobs * n_envs overload
  parallel_processing:
    enabled: false
    n_jobs: 1  # Deterministic mode forces sequential Optuna suggestions
    max_auto_jobs: 2  # Applied only when n_jobs is set to 0
    reserve_cores: 2  # Leave headroom for the OS/UI when auto-detecting
  parameters:
    # Core PPO parameters
    learning_rate:
      min: 5.0e-06
      max: 0.0008
      log: true
    n_steps:
      min: 256
      max: 768
      log: true
    ent_coef:
      min: 0.10
      max: 0.25
      log: false
    reward_turnover_penalty:
      min: 0.006
      max: 0.018
      log: false
    reward_calm_holding_bonus:
      min: 0.0008
      max: 0.0022
      log: false
